<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Dynamic Perspective Coaster 🧠</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Fira Code', monospace; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .hud-overlay { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .hud-blur { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="w-screen h-screen flex flex-col justify-between p-6 select-none text-white" x-data="coasterUiApp()">

    <div id="canvas-container"></div>

    <div class="hud-overlay flex justify-between items-center w-full max-w-5xl mx-auto">
        <div class="flex gap-3">
            <div class="hud-blur px-4 py-2 rounded-xl text-xs font-bold font-mono">
                <span class="text-purple-400">// FLOW:</span> <span x-text="labels[lang].status"></span>
            </div>
            <div class="hud-blur px-4 py-2 rounded-xl text-xs font-bold font-mono text-emerald-400 border border-emerald-500/20">
                // SPEED: X<span id="speed-multiplier">1.0</span>
            </div>
        </div>
        
        <button @click="toggleLang()" class="interactive hud-blur hover:border-purple-500/40 px-4 py-2 rounded-xl text-[11px] font-bold tracking-widest transition-all cursor-pointer shadow-xl">
            <span x-text="lang === 'tr' ? '🌐 ENGLISH' : '🌐 TÜRKÇE'"></span>
        </button>
    </div>

    <div class="hud-overlay my-auto mx-auto w-full max-w-xs text-center px-4">
        <div id="start-panel" class="interactive hud-blur p-6 rounded-2xl space-y-4 shadow-2xl">
            <h1 class="text-xs font-bold tracking-widest text-purple-400 font-mono">// PERSPECTIVE_FLOW_OS</h1>
            <p class="text-[11px] text-slate-400 leading-relaxed font-medium" x-text="labels[lang].desc"></p>
            <button onclick="startDynamicCoaster()" class="w-full bg-white text-black font-black py-3 rounded-xl text-xs tracking-wider hover:bg-purple-500 hover:text-white transition-all cursor-pointer" x-text="labels[lang].startBtn"></button>
        </div>
    </div>

    <div class="hud-overlay flex justify-center w-full">
        <div class="hud-blur px-5 py-1.5 rounded-full text-[10px] font-bold tracking-widest uppercase font-mono text-slate-400">
            <span x-text="labels[lang].footer"></span>
        </div>
    </div>

    <script>
        let scene, camera, renderer, coasterCurve;
        let tunnelGroup, playerCore;
        let isPlaying = false;
        
        let progress = 0;
        
        // 📈 HIZLANMA PARAMETRELERİ
        let baseSpeed = 0.0004;       // Başlangıçtaki o tatlı, sakin taban hızımız
        let maxSpeed = 0.0015;        // Sitenin ulaşabileceği maksimum X5 çılgın hız sınırı
        let speedMultiplier = 1.0;    // Ekranda görünecek çarpan (1.0'dan başlayacak)
        let currentSpeed = baseSpeed; // Aktif ilerleme hızı
        
        let mouseX = 0, mouseY = 0;
        let targetCamOffsetX = 0, targetCamOffsetY = 0;
        let currentCamOffsetX = 0, currentCamOffsetY = 0;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.035); // Derinlik sisi

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            tunnelGroup = new THREE.Group();
            scene.add(tunnelGroup);

            // 🎢 3 BOYUTLU HAT KIVRIMLARI
            const points = [];
            for (let i = 0; i < 80; i++) {
                points.push(new THREE.Vector3(
                    Math.sin(i * 0.3) * 5,   
                    Math.cos(i * 0.15) * 6,  
                    -i * 9                   
                ));
            }
            coasterCurve = new THREE.CatmullRomCurve3(points);

            buildCoasterTunnel();

            // 🟩 OYUNCUNUN KÜBÜ
            const coreGeo = new THREE.BoxGeometry(0.18, 0.18, 0.18);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            playerCore = new THREE.Mesh(coreGeo, coreMat);
            scene.add(playerCore);

            window.addEventListener('mousemove', handleInputMove);
            window.addEventListener('touchmove', handleInputTouch);

            loop();
        }

        function buildCoasterTunnel() {
            const totalWalls = 200;
            for (let i = 0; i < totalWalls; i++) {
                const t = i / totalWalls;
                const pos = coasterCurve.getPointAt(t);
                const tangent = coasterCurve.getTangentAt(t);

                const wallGeo = new THREE.TorusGeometry(3.0, 0.25, 4, 4); 
                const wallMat = new THREE.MeshBasicMaterial({ color: 0x1e1b4b });
                const wallMesh = new THREE.Mesh(wallGeo, wallMat);
                
                wallMesh.position.copy(pos);
                wallMesh.lookAt(pos.clone().add(tangent));
                wallMesh.rotation.z = i * 0.12; 

                tunnelGroup.add(wallMesh);
            }
        }

        function startDynamicCoaster() {
            document.getElementById('start-panel').classList.add('hidden');
            isPlaying = true;
        }

        function loop() {
            requestAnimationFrame(loop);

            if (isPlaying) {
                // 📈 ZAMANLA HIZLANMA ALGORİTMASI: Sitede kalındığı her an hız milimetrik olarak artar.
                if (currentSpeed < maxSpeed) {
                    currentSpeed += 0.0000005; // İvmelenme katsayısı
                    // Ekrana yansıtılacak çarpanı hesapla (Örn: X1.2, X2.5...)
                    speedMultiplier = (currentSpeed / baseSpeed).toFixed(1);
                    document.getElementById('speed-multiplier').innerText = speedMultiplier;
                }

                progress += currentSpeed;
                if (progress > 0.96) progress = 0; 

                const currentPos = coasterCurve.getPointAt(progress);
                const lookAtPos = coasterCurve.getPointAt(Math.min(progress + 0.008, 1));
                const tangent = coasterCurve.getTangentAt(progress);

                playerCore.position.copy(currentPos).add(tangent.clone().multiplyScalar(2.2));
                playerCore.position.x += mouseX * 0.7;
                playerCore.position.y += mouseY * 0.7;
                playerCore.lookAt(lookAtPos);

                // 🎬 KAMERA PARALAKS MEKANİĞİ
                targetCamOffsetX = -mouseX * 0.6;
                targetCamOffsetY = -mouseY * 0.4;

                currentCamOffsetX += (targetCamOffsetX - currentCamOffsetX) * 0.05;
                currentCamOffsetY += (targetCamOffsetY - currentCamOffsetY) * 0.05;

                camera.position.copy(currentPos);
                camera.position.x += currentCamOffsetX;
                camera.position.y += currentCamOffsetY;
                
                camera.lookAt(playerCore.position);

                // 🔮 DUVARLARIN DÖNÜŞÜ (Hız çarpanına göre duvarların dönüşü de senkronize hızlanır)
                const time = Date.now() * 0.001;
                tunnelGroup.children.forEach((wall, idx) => {
                    wall.rotation.z += 0.008 * speedMultiplier; // Duvar dönüşü hıza bağlandı!
                    const hue = (time * 0.02 * speedMultiplier + idx * 0.015) % 1;
                    wall.material.color.setHSL(hue, 0.65, 0.25);
                });
            }

            renderer.render(scene, camera);
        }

        function handleInputMove(e) {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function handleInputTouch(e) {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                mouseX = (touch.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
            }
        }

        function coasterUiApp() {
            return {
                lang: 'tr',
                labels: {
                    tr: {
                        status: "ACCELERATING_FLOW",
                        startBtn: "SİMÜLASYONU BAŞLAT",
                        desc: "Kutuyu hareket ettirdikçe bakış açısının değiştiği, sayfada bekledikçe ivmelenerek hızlanan hipnotik tünel.",
                        footer: "[ FARE VEYA PARMAK HAREKETİ İLE BAKIŞ AÇISI DEĞİŞİR ]"
                    },
                    en: {
                        status: "ACCELERATING_FLOW",
                        startBtn: "LAUNCH SIMULATION",
                        desc: "Hypnotic tunnel that changes perspective as you move the box and accelerates over time.",
                        footer: "[ MOUSE OR TOUCH MOVEMENT CHANGES PERSPECTIVE ]"
                    }
                },
                toggleLang() {
                    this.lang = this.lang === 'tr' ? 'en' : 'tr';
                }
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
